<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>风险分析视图</title>
    <link rel="stylesheet" href="./styles.css?v=2026071908" />
  </head>
  <body>
    <div class="system-frame">
      <header class="system-topbar">
        <div class="system-brand">
          <span class="system-brand__mark" aria-hidden="true"></span>
          <span class="system-brand__copy">
            <strong>ALM</strong>
            <small>资产负债管理系统</small>
          </span>
        </div>
        <nav class="system-topnav" aria-label="系统主导航">
          <button class="system-topnav__item" type="button">首页</button>
          <button class="system-topnav__item is-active" type="button">风险管理</button>
          <button class="system-topnav__item" type="button">报表管理</button>
          <button class="system-topnav__item" type="button">数据探索</button>
          <button class="system-topnav__item" type="button">投资管理</button>
          <button class="system-topnav__item" type="button">计量管理</button>
          <button class="system-topnav__item" type="button">权限配置</button>
        </nav>
        <div class="system-user">姜洪祥，您好！</div>
      </header>

      <div class="app-shell app-shell--system">
        <aside class="sidebar system-sidebar">
          <section class="panel sidebar__panel system-sidebar__panel">
            <nav class="system-menu" aria-label="风险管理菜单">
              <button class="system-menu__item is-active" type="button">
                <span class="system-menu__icon" aria-hidden="true"></span>
                <span>风险分析视图</span>
                <span class="system-menu__arrow system-menu__arrow--open" aria-hidden="true">›</span>
              </button>
              <div class="system-menu__subnav">
                <div class="page-tabs" id="pageTabs"></div>
              </div>
              <button class="system-menu__item" type="button">
                <span class="system-menu__icon" aria-hidden="true"></span>
                <span>市场数据管理</span>
                <span class="system-menu__arrow" aria-hidden="true">›</span>
              </button>
              <button class="system-menu__item" type="button">
                <span class="system-menu__icon" aria-hidden="true"></span>
                <span>银行账簿利率风险</span>
              </button>
              <button class="system-menu__item" type="button">
                <span class="system-menu__icon" aria-hidden="true"></span>
                <span>市场数据分析</span>
                <span class="system-menu__arrow" aria-hidden="true">›</span>
              </button>
              <button class="system-menu__item" type="button">
                <span class="system-menu__icon" aria-hidden="true"></span>
                <span>附属机构管理</span>
                <span class="system-menu__arrow" aria-hidden="true">›</span>
              </button>
              <button class="system-menu__item" type="button">
                <span class="system-menu__icon" aria-hidden="true"></span>
                <span>限额管理</span>
                <span class="system-menu__arrow" aria-hidden="true">›</span>
              </button>
              <button class="system-menu__item" type="button">
                <span class="system-menu__icon" aria-hidden="true"></span>
                <span>套期保值申请</span>
                <span class="system-menu__arrow" aria-hidden="true">›</span>
              </button>
              <button class="system-menu__item" type="button">
                <span class="system-menu__icon" aria-hidden="true"></span>
                <span>套期保值审核</span>
                <span class="system-menu__arrow" aria-hidden="true">›</span>
              </button>
            </nav>
          </section>
        </aside>

        <div class="workspace system-workspace">
          <header class="hero system-page-header">
            <div class="hero__content">
              <div class="hero__title-card">
                <div class="hero__title-row">
                  <div class="hero__title-copy">
                    <h1>风险分析视图</h1>
                  </div>
                  <div class="content__toolbar system-header-filters">
                    <div class="global-filter-bar" id="globalFilterBar"></div>
                  </div>
                  <div class="hero__meta">
                    <div class="hero__controls">
                      <div class="hero__controls-scope" id="riskDateControls">
                        <div class="hero__control-group">
                          <label class="hero__control-label" for="globalEndDate">结束时间</label>
                          <input class="hero__control-input" id="globalEndDate" type="date" />
                        </div>
                      </div>
                      <div class="hero__controls-scope" id="businessDateControls" hidden>
                        <div class="hero__control-group">
                          <label class="hero__control-label" for="businessEndDate">结束时间（月末）</label>
                          <select class="hero__control-input" id="businessEndDate" data-business-month-end-filter="1"></select>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <section class="content">
            <div id="dashboardView" class="dashboard-view"></div>
          </section>
        </div>
      </div>
    </div>

    <div class="filter-modal" id="filterModal" aria-hidden="true"></div>

    <script src="./dashboard-data.js?v=2026071908"></script>
    <script src="./dashboard-config.js?v=2026071908"></script>
    <script src="./mock-data-adapter.js?v=2026071908"></script>
    <script src="./dashboard-domain.js?v=2026071908"></script>
    <script src="./dashboard-utils.js?v=2026071908"></script>
    <script src="./app.js?v=2026071908"></script>
    <script src="./dashboard-simulation.js?v=2026071908"></script>
    <script src="./dashboard-processes.js?v=2026071908"></script>
    <script src="./dashboard-business-renderers.js?v=2026071908"></script>
    <script src="./dashboard-interest-renderers.js?v=2026071908"></script>
    <script src="./dashboard-liquidity-renderers.js?v=2026071908"></script>
    <script src="./dashboard-renderers.js?v=2026071908"></script>
    <script src="./dashboard-events.js?v=2026071908"></script>
  </body>
</html>
